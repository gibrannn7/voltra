name: voltra_mobile
description: "Voltra App - Smart PPOB & Bill Payment System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ─── State Management ─────────────────────────────
  provider: ^6.1.5+1

  # ─── Networking ────────────────────────────────────
  dio: ^5.9.2

  # ─── Storage ───────────────────────────────────────
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4

  # ─── Security ──────────────────────────────────────
  local_auth: ^3.0.1
  root_check: ^0.0.2+1
  flutter_windowmanager: ^0.2.0

  # ─── Firebase ──────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0

  # ─── Financial Precision ───────────────────────────
  decimal: ^3.2.4
  money2: ^6.3.0
  intl: ^0.20.2

  # ─── Bluetooth Printer ─────────────────────────────
  esc_pos_bluetooth: ^0.4.1
  esc_pos_utils: ^1.1.0

  # ─── UI / UX ──────────────────────────────────────
  lottie: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  share_plus: ^10.0.0
  smooth_page_indicator: ^1.2.0+3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Dependency overrides to resolve transitive dependency conflicts:
# - rxdart: esc_pos_bluetooth (^0.26.0) vs cached_network_image (>=0.27.7)
# - image: esc_pos_utils (^3.0.2) — ensure no conflict with other packages
dependency_overrides:
  rxdart: ^0.28.0
  image: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lexend-Bold.ttf
          weight: 700
